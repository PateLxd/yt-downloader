services:
  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pot-provider:
    # Proof-of-origin token provider for yt-dlp. Lets us pass YouTube's
    # bot challenge on flagged datacenter IPs even when valid signed-in
    # cookies aren't enough on their own. Opt-in via Compose profile so
    # users without this problem don't pay the extra image.
    #   echo 'COMPOSE_PROFILES=pot-provider' >> .env
    #   echo 'POT_PROVIDER_URL=http://pot-provider:4416' >> .env
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    init: true
    restart: unless-stopped
    profiles: ["pot-provider"]
    expose:
      - "4416"
    healthcheck:
      # The bgutil image only ships node — no wget/curl — so run the probe
      # through node itself.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:4416/ping', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://valkey:6379/0
      DOWNLOAD_DIR: /tmp/downloads
    volumes:
      - downloads:/tmp/downloads
      # Mount the host's ./secrets/cookies.txt (committed as an empty placeholder
      # so the bind always resolves to a file, never a Docker-created directory).
      # Replace it with a Netscape cookies.txt exported from a logged-in browser
      # and set YT_DLP_COOKIES_PATH=/run/cookies.txt in .env to use it.
      - ./secrets/cookies.txt:/run/cookies.txt:ro
    depends_on:
      valkey:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build:
      context: ./backend
    command: ["python", "worker.py"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://valkey:6379/0
      DOWNLOAD_DIR: /tmp/downloads
    volumes:
      - downloads:/tmp/downloads
      - ./secrets/cookies.txt:/run/cookies.txt:ro
    depends_on:
      valkey:
        condition: service_healthy
    deploy:
      replicas: 2  # 2 cores -> 2 concurrent jobs (one per worker)

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: /api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: /api
    expose:
      - "3000"

  cleanup:
    image: alpine:3.20
    command: ["sh", "-c", "while true; do find /tmp/downloads -type f -mmin +10 -delete 2>/dev/null; sleep 120; done"]
    restart: unless-stopped
    volumes:
      - downloads:/tmp/downloads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  downloads:
