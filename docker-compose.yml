services:
  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://valkey:6379/0
      DOWNLOAD_DIR: /tmp/downloads
    volumes:
      - downloads:/tmp/downloads
      # Mount the host's ./secrets/cookies.txt (committed as an empty placeholder
      # so the bind always resolves to a file, never a Docker-created directory).
      # Replace it with a Netscape cookies.txt exported from a logged-in browser
      # and set YT_DLP_COOKIES_PATH=/run/cookies.txt in .env to use it.
      - ./secrets/cookies.txt:/run/cookies.txt:ro
    depends_on:
      valkey:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build:
      context: ./backend
    command: ["python", "worker.py"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://valkey:6379/0
      DOWNLOAD_DIR: /tmp/downloads
    volumes:
      - downloads:/tmp/downloads
      - ./secrets/cookies.txt:/run/cookies.txt:ro
    depends_on:
      valkey:
        condition: service_healthy
    deploy:
      replicas: 2  # 2 cores -> 2 concurrent jobs (one per worker)

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: /api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: /api
    expose:
      - "3000"

  cleanup:
    image: alpine:3.20
    command: ["sh", "-c", "while true; do find /tmp/downloads -type f -mmin +10 -delete 2>/dev/null; sleep 120; done"]
    restart: unless-stopped
    volumes:
      - downloads:/tmp/downloads

  # Headless-Chromium service that keeps YouTube cookies fresh on a schedule.
  # Disabled by default — pulls a ~1.5 GB Playwright image, which is overkill
  # for users who are happy to re-upload cookies manually every few weeks.
  # Enable with:
  #     COMPOSE_PROFILES=cookie-refresh docker compose up -d
  # or by exporting it in .env (`COMPOSE_PROFILES=cookie-refresh`).
  cookie-refresh:
    profiles: ["cookie-refresh"]
    build:
      context: ./cookie_refresh
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://valkey:6379/0
    volumes:
      # Read-write so the service can rewrite the file with refreshed cookies.
      # Backend + worker still mount this :ro further up; that's fine, the
      # underlying inode is the same so they pick up the new content on next read.
      - ./secrets/cookies.txt:/run/cookies.txt:rw
      # Persistent Playwright profile so we don't redo the EU consent dialog
      # and YouTube's cookie warm-up on every refresh.
      - ./secrets/yt-state:/state:rw
    depends_on:
      valkey:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  downloads:
