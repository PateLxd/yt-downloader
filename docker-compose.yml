services:
  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://valkey:6379/0
      DOWNLOAD_DIR: /tmp/downloads
    volumes:
      - downloads:/tmp/downloads
    depends_on:
      valkey:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build:
      context: ./backend
    command: ["python", "worker.py"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://valkey:6379/0
      DOWNLOAD_DIR: /tmp/downloads
    volumes:
      - downloads:/tmp/downloads
    depends_on:
      valkey:
        condition: service_healthy
    deploy:
      replicas: 2  # 2 cores -> 2 concurrent jobs (one per worker)

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: /api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: /api
    expose:
      - "3000"

  cleanup:
    image: alpine:3.20
    command: ["sh", "-c", "while true; do find /tmp/downloads -type f -mmin +10 -delete 2>/dev/null; sleep 120; done"]
    restart: unless-stopped
    volumes:
      - downloads:/tmp/downloads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  downloads:
